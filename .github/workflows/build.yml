name: Build

on:
  push:
    branches:
      - master
      - redesign
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: plugin
