default_config:

frontend:
  extra_module_url:
    - http://localhost:4000/thermostat-dark-card.js

template:
  - sensor:
      - name: "Living Room Temperature"
        unit_of_measurement: "°C"
        state: "21.5"
      - name: "Bedroom Temperature"
        unit_of_measurement: "°C"
        state: "18.3"

climate:
  - platform: generic_thermostat
    name: Living Room
    heater: input_boolean.heater
    target_sensor: sensor.living_room_temperature
    min_temp: 15
    max_temp: 30
    target_temp: 21

  - platform: generic_thermostat
    name: Bedroom
    heater: input_boolean.bedroom_heater
    target_sensor: sensor.bedroom_temperature
    min_temp: 15
    max_temp: 30
    target_temp: 19

input_boolean:
  heater:
    name: Living Room Heater
  bedroom_heater:
    name: Bedroom Heater
